
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eid Mubarak</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020024,#090979,#000428);
color:white;
overflow:hidden;
}

/* stars background */

.stars{
position:absolute;
width:100%;
height:100%;
background:url("https://www.transparenttextures.com/patterns/stardust.png");
animation:move 120s linear infinite;
opacity:0.5;
}

@keyframes move{
from{background-position:0 0;}
to{background-position:10000px 5000px;}
}

/* main card */

.card{
position:relative;
text-align:center;
padding:60px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
box-shadow:0 0 40px rgba(0,0,0,0.5);
animation:fade 2s ease;
max-width:500px;
}

@keyframes fade{
from{opacity:0;transform:translateY(50px);}
to{opacity:1;transform:translateY(0);}
}

h1{
font-size:50px;
color:#FFD700;
text-shadow:0 0 25px gold;
}

p{
margin-top:15px;
font-size:18px;
color:#f1f1f1;
}

.name{
margin-top:25px;
font-size:22px;
color:#FFD700;
}

/* moon */

.moon{
position:absolute;
top:-60px;
right:-40px;
font-size:110px;
opacity:0.2;
animation:float 6s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0px)}
50%{transform:translateY(15px)}
100%{transform:translateY(0px)}
}

/* lanterns */

.lantern{
position:absolute;
font-size:40px;
animation:lanternMove 8s infinite ease-in-out;
}

.l1{left:10%; top:20%;}
.l2{right:15%; top:30%; animation-delay:2s;}
.l3{left:20%; bottom:20%; animation-delay:4s;}

@keyframes lanternMove{
0%{transform:translateY(0)}
50%{transform:translateY(20px)}
100%{transform:translateY(0)}
}

/* button */

button{
margin-top:30px;
padding:14px 30px;
border:none;
border-radius:30px;
background:#FFD700;
color:black;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

</style>
</head>

<body>

<div class="stars"></div>

<div class="lantern l1">🏮</div>
<div class="lantern l2">🏮</div>
<div class="lantern l3">🏮</div>

<div class="card">

<div class="moon">🌙</div>

<h1>Eid Mubarak</h1>

<p>
May Allah fill your life with happiness, peace, and success.
</p>

<p>
May this Eid bring endless blessings to you and your family.
</p>

<div class="name">
From ❤️<br>
Sakib Al Hasan Shehab
</div>

<button onclick="wish()"> Click For Wish</button>

</div>

</script>
<script>

function wish(){
alert("🌙 Eid Mubarak! May Allah accept your prayers and bless your life with happiness. — From Sakib Al Hasan Shehab");
}

</script>

</body>
</html>
